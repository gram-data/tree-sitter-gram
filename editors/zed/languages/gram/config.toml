name = "Gram"
grammar = "gram"
path_suffixes = ["gram"]
autoclose_before = ")]}'\":.,;>"
brackets = [
  { start = "{", end = "}", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = true },
  { start = "(", end = ")", close = true, newline = true },
]
word_characters = ["_"]

[prettier]
allowed = false

# Language servers are declared in extension.toml (`[language_servers.gram-lsp]`)
# and started from `src/lib.rs`. Per-server options go in Zed settings.json under `lsp`.
